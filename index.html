<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SvS Castle Timer</title>
<meta name="theme-color" content="#020818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SvS Timer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5/400.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5/700.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020818;--surface:rgba(10,20,60,0.75);--surface2:rgba(15,30,80,0.6);
  --border:rgba(80,120,255,0.2);--border2:rgba(100,150,255,0.4);
  --accent:#7eb8ff;--accent2:#ef4444;
  --green:#34d399;--blue:#a78bfa;
  --text:#dde8ff;--muted:#5a7aaa;--gold:#fbbf24;
  --red:#ef4444;--red-border:rgba(239,68,68,0.35);
  --main:#7eb8ff;--main-border:rgba(126,184,255,0.3);
  --counter:#34d399;--counter-border:rgba(52,211,153,0.3);
}
html,body{height:100%;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:44px 36px 90px}

/* Header */
.header{text-align:center;margin-bottom:24px;position:relative;padding-bottom:14px}
.header::after{content:'';display:block;position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--blue),var(--accent),transparent)}
.logo{font-size:46px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:#fff;text-shadow:0 0 24px rgba(126,184,255,0.5)}
.logo span{color:var(--accent)}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lang-btn{padding:6px 13px;background:rgba(10,20,60,0.8);border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--accent);color:#000}
.lock-btn{padding:8px 14px;background:rgba(10,20,60,0.8);border:1px solid var(--border2);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:background .15s,color .15s}
.lock-btn.unlocked{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);color:var(--green)}
@media(max-width:600px){.lock-btn{display:none}}
.hide-main-btn{padding:3px 8px;background:transparent;border:1px solid var(--main-border);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s}
.hide-main-btn:hover{background:rgba(126,184,255,0.1);color:var(--main)}
.team-panel.main.hidden-panel{display:none}
.locked-hidden{display:none!important}
.credit{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 0;opacity:.6}
.credit-mobile{display:none}
@media(max-width:600px){
  .credit-desktop{display:none}
  .credit-mobile{display:block;text-align:center;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 0 4px;opacity:.5}
}
/* Status dot */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:5px;vertical-align:middle}
.sync-dot.online{background:var(--green)}
.sync-dot.offline{background:var(--accent2)}

/* PIN modal */
.pin-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,8,24,0.92);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.pin-modal.show{display:flex}
.pin-box{background:rgba(10,20,60,0.95);border:1px solid var(--border2);border-radius:14px;padding:28px 24px;text-align:center;width:280px}
.pin-title{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.pin-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:16px}
.pin-input{width:100%;background:rgba(5,15,50,0.85);border:1px solid var(--border);border-radius:7px;padding:12px;font-family:'Rajdhani',sans-serif;font-size:22px;color:var(--text);text-align:center;letter-spacing:8px;outline:none;margin-bottom:10px}
.pin-input:focus{border-color:var(--accent)}
.pin-btns{display:flex;gap:8px}
.pin-ok{flex:1;padding:10px;background:var(--accent);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:#000;cursor:pointer}
.pin-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);cursor:pointer}
.pin-err{color:var(--accent2);font-size:11px;letter-spacing:1px;margin-top:6px;min-height:16px}

/* Form */
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:26px;backdrop-filter:blur(8px)}
.form-box.locked{display:none}
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.field{flex:1;min-width:100px}
.field.narrow{max-width:120px;flex:none}
.field.team-field{max-width:150px;flex:none}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;background:rgba(5,15,50,0.85);border:1px solid var(--border);border-radius:8px;padding:13px 15px;font-family:'Rajdhani',sans-serif;font-size:18px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#0a1230;color:var(--text)}
.add-btn{padding:13px 26px;background:var(--accent);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#000;cursor:pointer;white-space:nowrap;transition:opacity .15s;align-self:flex-end}
.add-btn:hover{opacity:.85}
.err{color:var(--accent2);font-size:11px;margin-top:6px;letter-spacing:1px}

/* Teams */
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.left-col{display:flex;flex-direction:column;gap:20px}
@media(max-width:600px){
  .teams-grid{grid-template-columns:1fr;gap:6px}
  .left-col{gap:6px}
  .page{padding:10px 8px 80px}
  .logo{font-size:16px;letter-spacing:2px}
  .field.narrow{max-width:85px}
  .field.team-field{max-width:100%;flex:1 1 100%}
  .add-btn{width:100%}
  .team-panel{padding:4px 8px 3px;border-radius:5px}
  .team-header{margin-bottom:3px;padding-bottom:3px}
  .team-title{font-size:8px;letter-spacing:1px}
  .rally-row{padding:3px 8px;min-height:22px;border-radius:5px}
  .r-name{font-size:11px}
  .r-sub{display:none}
  .r-time{font-size:12px;min-width:36px}
  .r-badge{font-size:6px;padding:1px 3px}
  .rally-list{gap:2px}
  .t-start{display:none}
  .t-reset{display:none}
  .e-start-btn{display:none}
  .team-btns{display:none}
  .row-ov-count{font-size:20px}
  .row-ov-name{font-size:10px}
  .row-ov-gr{font-size:7px}
  #lock-label{display:none}
  .auto-note{display:none}
  .empty-team{padding:4px 6px;font-size:8px}
  .lang-btn{padding:3px 7px;font-size:10px}
  .teams-grid{gap:3px}
  .left-col{gap:3px}
  .page{padding:8px 6px 60px}
  .rally-row .pb{height:1px}
  .header{position:fixed;bottom:0;left:0;right:0;z-index:50;margin:0;padding:10px 14px;background:rgba(2,8,24,0.95);backdrop-filter:blur(10px);border-top:1px solid rgba(80,120,255,0.2)}
  .header::after{display:none}
  .header-row{margin-bottom:0}
}
.team-panel{border-radius:14px;padding:26px;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.team-panel.main{border:1px solid var(--main-border);background:var(--surface)}
.team-panel.counter{border:1px solid var(--counter-border);background:var(--surface)}
.team-panel.enemy{border:1px solid var(--red-border);background:rgba(30,8,8,0.6)}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px}
.team-panel.main .team-header{border-bottom:1px solid var(--main-border)}
.team-panel.counter .team-header{border-bottom:1px solid var(--counter-border)}
.team-panel.enemy .team-header{border-bottom:1px solid var(--red-border)}
.team-title{font-size:17px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.team-panel.main .team-title{color:var(--main)}
.team-panel.counter .team-title{color:var(--counter)}
.team-panel.enemy .team-title{color:var(--red)}
.team-btns{display:flex;gap:6px}
.t-start{padding:8px 18px;border:none;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.team-panel.main .t-start{background:var(--main);color:#000}
.team-panel.counter .t-start{background:var(--counter);color:#000}
.t-start:disabled{opacity:.3;cursor:not-allowed}
.t-reset{padding:8px 12px;background:transparent;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.team-panel.main .t-reset{border:1px solid var(--main-border);color:var(--muted)}
.team-panel.counter .t-reset{border:1px solid var(--counter-border);color:var(--muted)}
.team-panel.enemy .t-reset{border:1px solid var(--red-border);color:var(--muted)}
.t-reset:hover{opacity:.7}
.rally-list{display:flex;flex-direction:column;gap:8px}
.rally-row{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-radius:10px;position:relative;overflow:hidden;transition:border-color .3s;border:1px solid rgba(80,120,255,0.12);min-height:74px}
.team-panel.enemy .rally-row{border-color:rgba(239,68,68,0.12)}
.rally-row .pb{position:absolute;bottom:0;left:0;height:3px;transition:width .5s linear}
.team-panel.main .rally-row .pb{background:linear-gradient(90deg,var(--main),var(--green))}
.team-panel.counter .rally-row .pb{background:linear-gradient(90deg,var(--counter),var(--blue))}
.team-panel.enemy .rally-row .pb{background:linear-gradient(90deg,var(--red),var(--gold))}
.rally-row.st-waiting{border-color:var(--gold)!important}
.rally-row.st-rally{border-color:var(--accent)!important}
.team-panel.enemy .rally-row.st-rally{border-color:var(--red)!important}
.rally-row.st-marching{border-color:var(--blue)!important}
.rally-row.st-done{opacity:.4}
.row-overlay{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:0 14px;background:rgba(2,8,24,0.93);border-radius:10px;transition:opacity .2s}
.row-overlay.hidden{opacity:0;pointer-events:none}

/* GET READY overlay – zentriert */
.row-ov-info{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;width:100%}
.row-ov-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.1;text-transform:uppercase}
.team-panel.main .row-ov-name{color:#fff;text-shadow:0 0 16px rgba(126,184,255,0.9)}
.team-panel.counter .row-ov-name{color:#fff;text-shadow:0 0 16px rgba(52,211,153,0.9)}
.row-ov-gr{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.team-panel.main .row-ov-gr{color:var(--main);text-shadow:0 0 10px rgba(126,184,255,0.7)}
.team-panel.counter .row-ov-gr{color:var(--counter);text-shadow:0 0 10px rgba(52,211,153,0.7)}
.row-ov-count{position:absolute;left:50%;transform:translateX(-50%);font-size:54px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;text-align:center}
.team-panel.main .row-ov-count{color:var(--main);text-shadow:0 0 12px rgba(126,184,255,0.8)}
.team-panel.counter .row-ov-count{color:var(--counter);text-shadow:0 0 12px rgba(52,211,153,0.8)}
.row-ov-count.red{color:var(--accent2)!important;text-shadow:0 0 12px rgba(239,68,68,0.8)!important}
.row-ov-count.start{color:var(--green)!important;text-shadow:0 0 12px rgba(52,211,153,0.9)!important;font-size:36px!important}
.row-ov-count.pulse{animation:pulse .35s ease-out}
@keyframes pulse{0%{transform:translateX(-50%) scale(1.25)}100%{transform:translateX(-50%) scale(1)}}
.r-left{flex:1;min-width:0;display:flex;flex-direction:column}
.r-name{font-size:20px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.r-note{font-size:13px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.r-note-input{font-size:13px;background:rgba(5,15,50,0.85);border:1px solid var(--border);border-radius:4px;padding:4px 6px;margin-top:4px;width:100%;font-family:'Rajdhani',sans-serif;color:var(--text);outline:none}
.r-sub{font-size:13px;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.r-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.r-badge{font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-weight:700;white-space:nowrap}
.r-badge.idle{background:rgba(80,120,255,0.1);color:var(--muted)}
.r-badge.wait{background:rgba(251,191,36,.15);color:var(--gold)}
.r-badge.rally{background:rgba(126,184,255,.15);color:var(--accent)}
.team-panel.enemy .r-badge.rally{background:rgba(239,68,68,.15);color:var(--red)}
.r-badge.march{background:rgba(167,139,250,.2);color:var(--blue)}
.r-badge.fin{background:rgba(80,100,160,.1);color:var(--muted)}
.r-time{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;min-width:68px;text-align:right}
.team-panel.main .r-time{color:var(--main)}
.team-panel.counter .r-time{color:var(--counter)}
.team-panel.enemy .r-time{color:var(--red)}
.r-time.t-march{color:var(--blue)!important}
.r-time.t-done{color:var(--muted)!important}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:3px;transition:color .15s;line-height:1}
.del-btn:hover{color:var(--accent2)}
.e-start-btn{padding:6px 12px;background:var(--red);border:none;border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap;line-height:1}
.e-start-btn:hover{opacity:.8}
.cancel-btn{padding:4px 10px;background:transparent;border:1px solid rgba(239,68,68,0.4);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.cancel-btn:hover{background:rgba(239,68,68,0.15)}
.reopen-btn{padding:4px 10px;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.5);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.reopen-btn:hover{background:rgba(251,191,36,0.25)}
.reopen-btn:disabled{opacity:.3;cursor:not-allowed}
.reopen-overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(2,8,24,0.95);border-radius:6px}
.reopen-overlay.hidden{display:none}
.reopen-text{font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 16px rgba(251,191,36,0.8);text-align:center}
.reopen-count{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--counter);text-shadow:0 0 14px rgba(52,211,153,0.8);text-align:center}
.reopen-count.red{color:var(--red)!important;text-shadow:0 0 14px rgba(239,68,68,0.8)!important}
.reopen-count.start{color:var(--green)!important;text-shadow:0 0 14px rgba(52,211,153,0.9)!important;font-size:32px!important}
.reopen-count.pulse{animation:pulse .35s ease-out}
.canceled-overlay{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:rgba(2,8,24,0.88);border-radius:6px;transition:opacity .3s}
.canceled-overlay.hidden{display:none}
.canceled-text{font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red);text-shadow:0 0 16px rgba(239,68,68,0.8)}
@media(max-width:600px){.canceled-text{font-size:14px;letter-spacing:2px}}
.empty-team{text-align:center;padding:24px 8px;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.auto-note{display:none}
.auto-note span{color:var(--counter)}
.connecting{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- PIN Modal -->
<div class="pin-modal" id="pin-modal">
  <div class="pin-box">
    <div class="pin-title">Admin PIN</div>
    <div class="pin-sub">Enter PIN to unlock editing</div>
    <input class="pin-input" id="pin-input" type="password" maxlength="10" placeholder="••••">
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-btns">
      <button class="pin-ok" onclick="submitPin()">Unlock</button>
      <button class="pin-cancel" onclick="closePin()">Cancel</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div class="header-row">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('kr')">한국어</button>
        <button class="lang-btn" onclick="setLang('tr')">TR</button>
        <button class="lang-btn" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('ru')">РУ</button>
        <button class="lang-btn" onclick="setLang('ar')">عر</button>
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
      </div>
      <div class="logo">SvS Castle <span>Timer</span></div>
      <button class="lock-btn" id="lock-btn" onclick="toggleLock()">
        <span class="sync-dot" id="sync-dot"></span><span id="lock-label">Locked</span>
      </button>
    </div>
  </div>

  <div class="form-box locked" id="form-box">
    <div class="form-row">
      <div class="field"><label id="t-name-label">Rally Leader Name</label><input id="inp-name" type="text" placeholder="Name"></div>
      <div class="field narrow"><label id="t-march-label">March (sec)</label><input id="inp-march" type="number" min="0" max="3599" placeholder="30"></div>
      <div class="field team-field">
        <label id="t-team-label">Team</label>
        <select id="inp-team">
          <option value="main" id="opt-main">Main Rally</option>
          <option value="counter" id="opt-counter">Counter Rally</option>
          <option value="enemy" id="opt-enemy">Enemy Rally</option>
        </select>
      </div>
      <button class="add-btn" id="t-add-btn" onclick="addRally()">+ Add</button>
    </div>
    <div id="err" class="err" style="display:none"></div>
  </div>

  <div id="main-ui" style="display:none">
    <div class="teams-grid">
      <div class="left-col">
        <div class="team-panel main">
          <div class="team-header">
            <div class="team-title" id="t-main-title">Main Rally</div>
            <div class="team-btns">
              <button class="t-start" id="start-main" onclick="startSequence('main')" disabled></button>
              <button class="t-reset" id="t-reset-main" onclick="resetTeam('main')"></button>
            </div>
          </div>
          <div class="rally-list" id="list-main"></div>
        </div>
        <div class="team-panel counter">
          <div class="team-header">
            <div class="team-title" id="t-counter-title">Counter Rally</div>
            <div class="team-btns">
              <button class="t-start" id="start-counter" onclick="startSequence('counter')" disabled></button>
              <button class="reopen-btn locked-hidden" id="restart-counter-btn" onclick="restartCounterRally()" disabled>↺ Restart</button>
              <button class="t-reset" id="t-reset-counter" onclick="resetTeam('counter')"></button>
            </div>
          </div>
          <div class="rally-list" id="list-counter"></div>
        </div>

<script>
// =========================================================
// Firebase Setup

const firebaseConfig = {
  apiKey: "AIzaSyAFsBvmgj7-VQYcFVj6snk7l5ramb1mAUk",
  authDomain: "svs-timer-5dc4e.firebaseapp.com",
  databaseURL: "https://svs-timer-5dc4e-default-rtdb.europe-west1.firebasedatabase.app",

  measurementId: "G-3SR83HKFZX"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
function ref(p){return db.ref("svs/"+p);}
function fbSet(p,v){ref(p).set(v);}
function fbUpdate(p,v){ref(p).update(v);}

// =========================================================
// Constants
// =========================================================
let isReopening = false;
let reopenMaxDelay = 0;
const BASE_TIME    = 300;
const ENEMY_BASE   = 295;
const ADMIN_HASH   = "ef2a09456fa517d87905aff62ae8c262cca11656bea97e9e90b8aef87c9cdf30";
const COUNTDOWN_MS = 5000;

// =========================================================
// App State
// =========================================================
let isUnlocked = false;
let lang = "en";
let L = null;
let STATE = {main:{rallies:[],started:false,timerStart:null},counter:{rallies:[],started:false,timerStart:null},enemy:{rallies:[],started:false,timerStart:null}};
let prevState = {main:{started:false,timerStart:null},counter:{started:false,timerStart:null},enemy:{started:false,timerStart:null}};
let localTickers = {main:null,counter:null,enemy:null};

// =========================================================

const LANGS = {/*...*/};
function setLang(newLang){
  lang = newLang; L = LANGS[lang];
  const map={en:"EN",kr:"한국어",tr:"TR",zh:"中文",ru:"РУ",ar:"عر",fr:"FR"};
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("active",b.textContent===map[lang]));
  document.getElementById("t-name-label").textContent = L.nameLabel;

  ["main","counter","enemy"].forEach(t=>{ const sb=document.getElementById("start-"+t); if(sb) sb.textContent=L.startBtn; document.getElementById("t-reset-"+t).textContent=L.resetBtn; renderTeam(t); });
}

// =========================================================
// PIN / Admin Auth
// =========================================================
function toggleLock(){ isUnlocked?lock():openPin(); }
function openPin(){ document.getElementById("pin-input").value=""; document.getElementById("pin-err").textContent=""; document.getElementById("pin-modal").classList.add("show"); setTimeout(()=>document.getElementById("pin-input").focus(),100); }
function closePin(){ document.getElementById("pin-modal").classList.remove("show"); }
async function submitPin(){
  const input=document.getElementById("pin-input").value;
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(input));
  const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  if(hash===ADMIN_HASH){
    isUnlocked=true;
    document.getElementById("form-box").classList.remove("locked");
    document.getElementById("lock-btn").classList.add("unlocked");
    document.getElementById("lock-label").textContent="Unlocked";
    setControlsVisibility(true);
    closePin();
    ["main","counter","enemy"].forEach(renderTeam);
  }else{
    document.getElementById("pin-err").textContent="Wrong PIN.";
    document.getElementById("pin-input").value="";
    document.getElementById("pin-input").focus();
  }
}
function lock(){
  isUnlocked=false;
  document.getElementById("form-box").classList.add("locked");
  document.getElementById("lock-btn").classList.remove("unlocked");
  document.getElementById("lock-label").textContent="Locked";
  setControlsVisibility(false);
  ["main","counter","enemy"].forEach(renderTeam);
}
function setControlsVisibility(v){
  document.querySelectorAll(".t-start,.t-reset,.reopen-btn").forEach(e=>e.classList.toggle("locked-hidden",!v));
}
function updateCounterRestartBtn(){ const btn=document.getElementById("restart-counter-btn"); if(btn) btn.disabled=!STATE.counter.started||!STATE.counter.rallies.length; }
document.getElementById("pin-input").addEventListener("keydown",e=>{ if(e.key==="Enter") submitPin(); });

// =========================================================
// Utility Functions
// =========================================================
function fmt(s){s=Math.max(0,Math.round(s)); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function calcDelays(r){ if(!r.length) return r; const act=r.filter(x=>!x.canceled); if(!act.length) return r; const maxT=Math.max(...act.map(x=>x.total)); return r.map(x=>x.canceled?x:{...x,delay:maxT-x.total}); }
function getElapsed(t){ if(!t) return null; return (Date.now()-t)/1000; }
function getRallyState(r,el,started){ if(!started||el===null) return "idle"; if(el<0) return "idle"; if(el<r.delay) return "waiting"; const rel=el-r.delay; if(rel<BASE_TIME) return "rally"; if(rel<r.total) return "marching"; return "done"; }

// =========================================================
// Audio (Web Audio API)
// =========================================================
let audioCtx=null;
function getAudioCtx(){ if(!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)();} if(audioCtx.state==="suspended") audioCtx.resume(); return audioCtx;}
function playTone(f,d,v=0.3,t="sine"){try{const ctx=getAudioCtx(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type=t; o.frequency.setValueAtTime(f,ctx.currentTime); g.gain.setValueAtTime(0,ctx.currentTime); g.gain.linearRampToValueAtTime(v,ctx.currentTime+0.015); g.gain.linearRampToValueAtTime(0,ctx.currentTime+d); o.start(ctx.currentTime); o.stop(ctx.currentTime+d+0.02);}catch(e){}}
function beepGetReady(){playTone(440,0.25,0.25);}
function beepTick(){playTone(520,0.12,0.22);}
function beepStart(){playTone(600,0.10,0.30); setTimeout(()=>playTone(800,0.18,0.35),110);}
function beepAlarm(){playTone(520,0.45,0.30); setTimeout(()=>playTone(520,0.45,0.30),600); setTimeout(()=>playTone(520,0.45,0.30),1200);}
function stopAllAudio(){try{if(audioCtx){audioCtx.close();audioCtx=null;}}catch(e){}}
document.addEventListener("click",()=>getAudioCtx(),{once:true});
document.addEventListener("touchstart",()=>getAudioCtx(),{once:true});

// =========================================================
// Helper: pulse animation
// =========================================================
function pulseCt(el){el.classList.remove("pulse"); void el.offsetWidth; el.classList.add("pulse");}

// =========================================================
// Rally Management (Admin)
// =========================================================
function addRally(){
  const name=document.getElementById("inp-name").value.trim();
  const raw=document.getElementById("inp-march").value.trim();
  const team=document.getElementById("inp-team").value;
  const err=document.getElementById("err"); err.style.display="none";

  if(!name){ err.textContent=L.errName; err.style.display="block"; return; }
  const march=parseInt(raw);
  if(isNaN(march)||march<0){ err.textContent=L.errFmt; err.style.display="block"; return; }

  const base=team==="enemy"?ENEMY_BASE:BASE_TIME;
  const total=base+march;
  const newRally={id:Date.now(),name,march,total,delay:0,started:false,timerStart:null,note:""};
  const upd=calcDelays([...STATE[team].rallies,newRally]);
  fbSet(team+"/rallies",upd);
  document.getElementById("inp-name").value=""; document.getElementById("inp-march").value=""; document.getElementById("inp-name").focus();
}
function deleteRally(team,id){ if(!isUnlocked) return; fbSet(team+"/rallies",calcDelays(STATE[team].rallies.filter(r=>r.id!==id))); }
function updateRallyNote(team,id,val){
  const upd=STATE[team].rallies.map(r=>r.id===id?{...r,note:val}:r);
  fbSet(team+"/rallies",upd);
}
const pendingCancelResets=new Set();
function cancelRally(team,id){
  stopLocalTicker(team);
  const upd=STATE[team].rallies.map(r=>r.id===id?{...r,canceled:true,started:false,timerStart:null}:r);
  fbSet(team+"/rallies",upd);
  const key=team+"_"+id; if(pendingCancelResets.has(key)) return; pendingCancelResets.add(key);
  setTimeout(()=>{ pendingCancelResets.delete(key); const cur=STATE[team].rallies.find(r=>r.id===id); if(cur&&cur.canceled){ const reset=STATE[team].rallies.map(r=>r.id===id?{...r,canceled:false,started:false,timerStart:null}:r); fbSet(team+"/rallies",reset); } },4000);
}
function unCancelRally(team,id){
  const upd=STATE[team].rallies.map(r=>r.id===id?{...r,canceled:false}:r);
  fbSet(team+"/rallies",upd);
}

// =========================================================
// Timer Start / Reset
// =========================================================
function startSequence(team){
  if(!STATE[team].rallies.length) return;
  const launchAt=Date.now()+COUNTDOWN_MS;
  fbUpdate(team,{started:true,timerStart:launchAt});
}
function startAllEnemy(){
  const now=Date.now();
  const upd=STATE.enemy.rallies.map(r=>r.started? r : {...r,started:true,timerStart:now});
  fbSet("enemy/rallies",upd);
  if(STATE.counter.rallies.length && !STATE.counter.started) startSequence("counter");
}
function runRestartSequence(counterRallies,enemyUpdate){
  const REOPEN_BASE=5, LABEL_MS=1500;
  counterRallies.forEach(r=>{
    const ov=document.getElementById("reopen-ov-counter-"+r.id);
    const txt=document.getElementById("reopen-txt-counter-"+r.id);
    const cnt=document.getElementById("reopen-cnt-counter-"+r.id);
    if(!ov) return;
    ov.classList.remove("hidden");
    if(txt){ txt.textContent=lang==="kr"? "재시작 재시작 재시작":"RESTART RESTART RESTART"; txt.style.display=""; }
    if(cnt){ cnt.textContent=""; cnt.style.display="none"; }
  });
  setTimeout(()=>{
    const launchAt=Date.now()+REOPEN_BASE*1000;
    const upd={ "counter/started":true, "counter/timerStart":launchAt };
    if(enemyUpdate) upd["enemy/rallies"]=enemyUpdate;
    db.ref("svs").update(upd);
    const maxDelay=Math.max(...counterRallies.map(r=>r.delay||0));
    counterRallies.forEach(r=>{
      const txt=document.getElementById("reopen-txt-counter-"+r.id);
      const cnt=document.getElementById("reopen-cnt-counter-"+r.id);
      if(!cnt) return;
      if(txt) txt.style.display="none";
      cnt.style.display="";
      let c=REOPEN_BASE+r.delay;
      cnt.textContent=c; cnt.className="reopen-count"; cnt.classList.remove("pulse"); void cnt.offsetWidth; cnt.classList.add("pulse");
      if(r.delay===0) beepTick();
      const iv=setInterval(()=>{
        c--;
        const cnt2=document.getElementById("reopen-cnt-counter-"+r.id);
        const ov2=document.getElementById("reopen-ov-counter-"+r.id);
        if(!cnt2){clearInterval(iv);return;}
        if(c>0){
          cnt2.textContent=c; cnt2.className="reopen-count"+(c<=2?" red":""); cnt2.classList.remove("pulse"); void cnt2.offsetWidth; cnt2.classList.add("pulse");
          if(r.delay===0) beepTick();
        }else{
          clearInterval(iv);
          cnt2.className="reopen-count start"; cnt2.textContent=L.startText; beepStart();
          setTimeout(()=>{ if(ov2) ov2.classList.add("hidden"); const txt2=document.getElementById("reopen-txt-counter-"+r.id); if(txt2) txt2.style.display=""; if(r.delay===maxDelay){ isReopening=false; renderTeam("counter"); } },800);
        }
      },1000);
    });
  },LABEL_MS);
}
function reopenRallies(){
  const btn=document.getElementById("reopen-btn"); if(btn) btn.disabled=true;
  isReopening=true; stopAllAudio(); stopLocalTicker("counter"); if(localTickers.enemy){clearInterval(localTickers.enemy);localTickers.enemy=null;}
  document.querySelectorAll("#list-counter .row-overlay").forEach(o=>o.classList.add("hidden"));
  document.querySelectorAll("#list-counter .reopen-overlay").forEach(o=>o.classList.add("hidden"));
  fbUpdate("counter",{started:false,timerStart:null});
  const now=Date.now();
  const enemyRestarted=STATE.enemy.rallies.map(r=>({ ...r, started:true, timerStart:now, canceled:false }));
  const cr=STATE.counter.rallies;
  if(!cr.length){ fbSet("enemy/rallies",enemyRestarted); isReopening=false; return;}
  beepAlarm(); runRestartSequence(cr,enemyRestarted);
}
function restartCounterRally(){
  const btn=document.getElementById("restart-counter-btn"); if(btn) btn.disabled=true;
  isReopening=true; stopAllAudio(); stopLocalTicker("counter");
  document.querySelectorAll("#list-counter .row-overlay").forEach(o=>o.classList.add("hidden"));
  document.querySelectorAll("#list-counter .reopen-overlay").forEach(o=>o.classList.add("hidden"));
  fbUpdate("counter",{started:false,timerStart:null});
  const cr=STATE.counter.rallies;
  if(!cr.length){ isReopening=false; return;}
  beepAlarm(); runRestartSequence(cr,null);
}
function startEnemyRallyFb(id){
  const now=Date.now(); const upd=STATE.enemy.rallies.map(r=>r.id===id?{...r,started:true,timerStart:now}:r);
  fbSet("enemy/rallies",upd);
}
function resetTeam(team){
  if(team==="enemy"){
    const upd=STATE.enemy.rallies.map(r=>({ ...r, started:false, timerStart:null }));
    fbUpdate(team,{rallies:upd,started:false,timerStart:null});
  }else fbUpdate(team,{started:false,timerStart:null});
}

// =========================================================
// GET READY Overlay (zentriert)
// =========================================================
function getOv(team,id){ const row=document.querySelector(`#list-${team} [data-id="${id}"]`); return row?row.querySelector(".row-overlay"):null; }
function runOverlay(team,rally){
  const row=document.querySelector(`#list-${team} [data-id="${rally.id}"]`);
  if(!row) return;
  const ov=row.querySelector(".row-overlay");
  const gr=row.querySelector(".row-ov-gr");
  const cnt=row.querySelector(".row-ov-count");
  const info=row.querySelector(".row-ov-info");
  if(!ov) return;
  ov.classList.remove("hidden"); if(info) info.style.display="flex";
  gr.textContent=L.grText; cnt.textContent=""; cnt.className="row-ov-count"; cnt.style.display="none";
  beepGetReady();
  setTimeout(()=>{
    const ov2=getOv(team,rally.id);
    if(!ov2) return;
    const cnt2=ov2.querySelector(".row-ov-count");
    const info2=ov2.querySelector(".row-ov-info");
    if(!cnt2) return;
    if(info2) info2.style.display="none";
    cnt2.style.display="";
    let c=3+rally.delay;
    cnt2.textContent=c; pulseCt(cnt2); beepTick();
    const int=setInterval(()=>{
      c--;
      const ov3=getOv(team,rally.id);
      const ce=ov3?ov3.querySelector(".row-ov-count"):null;
      if(!ce){ clearInterval(int); return; }
      if(c>0){
        ce.textContent=c; ce.className="row-ov-count"+(c<=2?" red":""); pulseCt(ce); beepTick();
      }else{
        clearInterval(int);
        ce.className="row-ov-count start"; ce.textContent=L.startText; beepStart();
        setTimeout(()=>{ const o=getOv(team,rally.id); if(o) o.classList.add("hidden"); },800);
      }
    },1000);
  },2000);
}

// =========================================================
// Local Tickers (UI)
// =========================================================
function startLocalTicker(team){ if(localTickers[team]) clearInterval(localTickers[team]); localTickers[team]=setInterval(()=>tickTeam(team),200); }
function stopLocalTicker(team){ if(localTickers[team]){ clearInterval(localTickers[team]); localTickers[team]=null; } }
function tickTeam(team){
  const T=STATE[team]; if(!T.started||!T.timerStart) return;
  const el=getElapsed(T.timerStart);
  T.rallies.forEach(r=>{
    const row=document.querySelector(`#list-${team} [data-id="${r.id}"]`);
    if(!row) return;
    const overlay=row.querySelector(".row-overlay");
    if(overlay && !overlay.classList.contains("hidden")) return;
    if(r.canceled) return;
    const st=getRallyState(r,el,T.started);
    row.className="rally-row st-"+st;
    const badge=row.querySelector(".r-badge");
    const time=row.querySelector(".r-time");
    const pb=row.querySelector(".pb");
    if(!badge) return;
    if(st==="idle"){ badge.className="r-badge idle"; badge.textContent=L.badgeReady; time.className="r-time"; time.textContent=fmt(BASE_TIME); pb.style.width="0%"; }
    else if(st==="waiting"){ badge.className="r-badge wait"; badge.textContent=L.badgeWait; time.className="r-time"; time.textContent=fmt(r.delay-el); pb.style.width="0%"; }
    else if(st==="rally"){ const rel=el-r.delay; badge.className="r-badge rally"; badge.textContent=L.badgeRally; time.className="r-time"; time.textContent=fmt(BASE_TIME-rel); pb.style.width=(Math.min(100,rel/BASE_TIME*100)).toFixed(1)+"%"; }
    else if(st==="marching"){ const rel=el-r.delay; badge.className="r-badge march"; badge.textContent=L.badgeMarch; time.className="r-time t-march"; time.textContent=fmt(r.total-rel); pb.style.width=(Math.min(100,rel/r.total*100)).toFixed(1)+"%"; }
    else{ badge.className="r-badge fin"; badge.textContent=L.badgeDone; time.className="r-time t-done"; time.textContent="00:00"; pb.style.width="100%"; }
  });
  const allDone=T.rallies.every(r=>getRallyState(r,el,T.started)==="done");
  if(el>=0 && allDone){ stopLocalTicker(team); fbUpdate(team,{started:false,timerStart:null}); }
}
function tickEnemy(){
  STATE.enemy.rallies.forEach(r=>{
    if(!r.started||!r.timerStart) return;
    if(r.canceled) return;
    const el=(Date.now()-r.timerStart)/1000;
    const row=document.querySelector(`#list-enemy [data-id="${r.id}"]`);
    if(!row) return;
    const badge=row.querySelector(".r-badge"); const time=row.querySelector(".r-time"); const pb=row.querySelector(".pb");
    if(!badge) return;
    if(el<ENEMY_BASE){ badge.className="r-badge rally"; badge.textContent=L.badgeRally; time.className="r-time"; time.textContent=fmt(ENEMY_BASE-el); pb.style.width=(Math.min(100,el/ENEMY_BASE*100)).toFixed(1)+"%"; row.className="rally-row st-rally"; }
    else if(el<r.total){ badge.className="r-badge march"; badge.textContent=L.badgeMarch; time.className="r-time t-march"; time.textContent=fmt(r.total-el); pb.style.width=(Math.min(100,el/r.total*100)).toFixed(1)+"%"; row.className="rally-row st-marching"; }
    else{
      const upd=STATE.enemy.rallies.map(x=>x.id===r.id?{...x,started:false,timerStart:null}:x);
      fbSet("enemy/rallies",upd);
    }
  });
}

// =========================================================
// Render
// =========================================================
function renderTeam(team){
  const T=STATE[team];
  const list=document.getElementById("list-"+team);
  const startBtn=document.getElementById("start-"+team);
  if(startBtn) startBtn.textContent=L.startBtn;
  document.getElementById("t-reset-"+team).textContent=L.resetBtn;
  if(startBtn) startBtn.disabled=!T.rallies.length||T.started;
  if(team==="counter" && isReopening) return;
  if(!T.rallies || !T.rallies.length){
    list.innerHTML=`<div class="empty-team">${L.empty}</div>`;
    return;
  }
  const showDelete=isUnlocked && !T.started;
  if(team==="enemy"){
    const reopenBtn=document.getElementById("reopen-btn");
    if(reopenBtn) reopenBtn.disabled=!T.rallies.some(r=>r.started);
    list.innerHTML=T.rallies.map(rally=>`
      <div class="rally-row st-idle" data-id="${rally.id}">
        <div class="pb" style="width:0%"></div>
        <div class="r-left">
          <div class="r-name">${rally.name}</div>
          <div class="r-sub">${rally.march}s march · 04:55 base</div>
        </div>
        <div class="r-right">
          <span class="r-badge idle">${L.badgeReady}</span>
          <span class="r-time">${fmt(ENEMY_BASE)}</span>
          ${isUnlocked && !rally.started && !rally.canceled
            ? `<button class="e-start-btn" onclick="startEnemyRallyFb(${rally.id})">${L.eStartBtn}</button>` : ""}
          ${isUnlocked && rally.started && !rally.canceled
            ? `<button class="cancel-btn" onclick="cancelRally('enemy',${rally.id})">✕ Cancel</button>` : ""}
          ${showDelete ? `<button class="del-btn" onclick="deleteRally('enemy',${rally.id})">✕</button>` : ""}
        </div>
        <div class="canceled-overlay${rally.canceled?'':' hidden'}"><span class="canceled-text">RALLY CANCELED</span></div>
      </div>
    `).join("");
    return;
  }

  if(team==="counter") updateCounterRestartBtn();

  list.innerHTML=T.rallies.map(rally=>`
    <div class="rally-row st-idle" data-id="${rally.id}">
      <div class="pb" style="width:0%"></div>
      <div class="row-overlay hidden">
        <div class="row-ov-info">
          <div class="row-ov-name">${rally.name}</div>
          <div class="row-ov-gr"></div>
        </div>
        <div class="row-ov-count"></div>
      </div>
      <div class="r-left">
        <div class="r-name">${rally.name}</div>
        ${isUnlocked
          ? `<input class="r-note-input" value="${rally.note||''}" onchange="updateRallyNote('${team}',${rally.id},this.value)" placeholder="Additional note">`
          : `<div class="r-note">${rally.note||''}</div>`}
        <div class="r-sub">${rally.march}s march · offset ${rally.delay>0? "+"+fmt(rally.delay) : "first"}</div>
      </div>
      <div class="r-right">
        <span class="r-badge idle">${L.badgeReady}</span>
        <span class="r-time">${fmt(BASE_TIME)}</span>
        ${isUnlocked && T.started && !rally.canceled
          ? `<button class="cancel-btn" onclick="cancelRally('${team}',${rally.id})">✕ Cancel</button>`
          : ""}
        ${showDelete ? `<button class="del-btn" onclick="deleteRally('${team}',${rally.id})">✕</button>` : ""}
      </div>
      <div class="canceled-overlay${rally.canceled?'':' hidden'}"><span class="canceled-text">RALLY CANCELED</span></div>
      <div class="reopen-overlay hidden" id="reopen-ov-${team}-${rally.id}">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div class="reopen-text" id="reopen-txt-${team}-${rally.id}">RESTART RESTART RESTART</div>
          <div class="reopen-count" id="reopen-cnt-${team}-${rally.id}" style="display:none"></div>
        </div>
      </div>
    </div>
  `).join("");
}

// =========================================================
// Firebase Listeners
// =========================================================
function listenTeam(team){
  ref(team).on("value",snap=>{
    document.getElementById("connecting").style.display="none";
    document.getElementById("main-ui").style.display="block";
    document.getElementById("sync-dot").classList.add("online");
    const data=snap.val()||{};
    const newRallies=data.rallies||[];
    const newStarted=!!data.started;
    const newTimerStart=data.timerStart||null;
    const prev=prevState[team];
    STATE[team]={rallies:newRallies,started:newStarted,timerStart:newTimerStart};
    prevState[team]={started:newStarted,timerStart:newTimerStart};
    renderTeam(team);
    if(team!=="enemy"){
      if(newStarted && newTimerStart){
        const elapsed=getElapsed(newTimerStart);
        const fresh=!prev.started||prev.timerStart!==newTimerStart;
        if(fresh && elapsed<0 && !isReopening) setTimeout(()=>newRallies.forEach(r=>runOverlay(team,r)),50);
        startLocalTicker(team);
      }else stopLocalTicker(team);
    }else{
      const hasActive=newRallies.some(r=>r.started);
      if(hasActive){
        if(!localTickers.enemy) localTickers.enemy=setInterval(tickEnemy,200);
      }else{
        if(localTickers.enemy){clearInterval(localTickers.enemy);localTickers.enemy=null;}
      }
    }
  });
}
["main","counter","enemy"].forEach(listenTeam);
db.ref(".info/connected").on("value",snap=>{
  const dot=document.getElementById("sync-dot");
  if(snap.val()){ dot.classList.add("online"); dot.classList.remove("offline"); }
  else{ dot.classList.remove("online"); dot.classList.add("offline"); }
});

// =========================================================
// Starfield Background
// =========================================================
(function initStars(){
  const canvas=document.getElementById("stars");
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener("resize",resize);
  const ctx=canvas.getContext("2d");
  const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.2,phase:Math.random(),speed:Math.random()*0.004+0.001}));
  const nebulae=[
    {x:0.10,y:0.30,rx:200,ry:120,color:"rgba(40,0,120,0.15)"},
    {x:0.85,y:0.55,rx:180,ry:110,color:"rgba(100,0,0,0.12)"},
    {x:0.50,y:0.85,rx:220,ry:80,color:"rgba(0,40,140,0.12)"},
    {x:0.60,y:0.10,rx:160,ry:90,color:"rgba(0,60,160,0.10)"}
  ];
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    nebulae.forEach(n=>{
      const cx=n.x*canvas.width, cy=n.y*canvas.height;
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,n.rx);
      grad.addColorStop(0,n.color); grad.addColorStop(1,"transparent");
      ctx.save(); ctx.scale(1,n.ry/n.rx); ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy*(n.rx/n.ry),n.rx,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    stars.forEach(s=>{
      s.phase+=s.speed; if(s.phase>1) s.phase=0;
      const a=0.2+Math.abs(Math.sin(s.phase*Math.PI))*0.8;
      ctx.beginPath(); ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
