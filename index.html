<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SvS Castle Timer</title>
<meta name="theme-color" content="#020818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SvS Timer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5/400.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5/700.css" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020818;--surface:rgba(10,20,60,0.75);--surface2:rgba(15,30,80,0.6);
  --border:rgba(80,120,255,0.2);--border2:rgba(100,150,255,0.4);
  --accent:#7eb8ff;--accent2:#ef4444;
  --green:#34d399;--blue:#a78bfa;
  --text:#dde8ff;--muted:#5a7aaa;--gold:#fbbf24;
  --red:#ef4444;--red-border:rgba(239,68,68,0.35);
  --main:#7eb8ff;--main-border:rgba(126,184,255,0.3);
  --counter:#34d399;--counter-border:rgba(52,211,153,0.3);
}

html,body{height:100%;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1680px;margin:0 auto;padding:44px 48px 90px}
.header{text-align:center;margin-bottom:24px;position:relative;padding-bottom:14px}
.header::after{content:'';display:block;position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--blue),var(--accent),transparent)}
.logo{font-size:46px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:#fff;text-shadow:0 0 24px rgba(126,184,255,0.5)}
.logo span{color:var(--accent)}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lang-btn{padding:6px 13px;background:rgba(10,20,60,0.8);border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--accent);color:#000}
.lock-btn{padding:8px 14px;background:rgba(10,20,60,0.8);border:1px solid var(--border2);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:background .15s,color .15s}
.lock-btn.unlocked{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);color:var(--green)}
@media(max-width:600px){.lock-btn{display:none}}
.hide-main-btn{padding:3px 8px;background:transparent;border:1px solid var(--main-border);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s}
.hide-main-btn:hover{background:rgba(126,184,255,0.1);color:var(--main)}
.team-panel.main.hidden-panel{display:none}
.locked-hidden{display:none!important}
.credit{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 0;opacity:.6}
@keyframes rainbow{0%{background-position:200% 50%}100%{background-position:0% 50%}}
.rainbow{background:linear-gradient(90deg,#ff0000,#ff7700,#ffff00,#00ff00,#00ffff,#0077ff,#ff00ff,#ff0000);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbow 6s linear infinite;font-weight:700}
.credit-mobile{display:none}
@media(max-width:600px){
  .credit-desktop{display:none}
  .credit-mobile{display:block;text-align:center;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 0 4px;opacity:.5}
}

.sync-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:5px;vertical-align:middle}
.sync-dot.online{background:var(--green)}
.sync-dot.offline{background:var(--accent2)}

.pin-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,8,24,0.92);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.pin-modal.show{display:flex}
.pin-box{background:rgba(10,20,60,0.95);border:1px solid var(--border2);border-radius:14px;padding:28px 24px;text-align:center;width:280px}
.pin-title{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.pin-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:16px}
.pin-input{width:100%;background:rgba(5,15,50,0.85);border:1px solid var(--border);border-radius:7px;padding:12px;font-family:'Rajdhani',sans-serif;font-size:22px;color:var(--text);text-align:center;letter-spacing:8px;outline:none;margin-bottom:10px}
.pin-input:focus{border-color:var(--accent)}
.pin-btns{display:flex;gap:8px}
.pin-ok{flex:1;padding:10px;background:var(--accent);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:#000;cursor:pointer}
.pin-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);cursor:pointer}
.pin-err{color:var(--accent2);font-size:11px;letter-spacing:1px;margin-top:6px;min-height:16px}

.form-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:26px;backdrop-filter:blur(8px)}
.form-box.locked{display:none}
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.field{flex:1;min-width:100px}
.field.narrow{max-width:120px;flex:none}
.field.team-field{max-width:150px;flex:none}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;background:rgba(5,15,50,0.85);border:1px solid var(--border);border-radius:8px;padding:13px 15px;font-family:'Rajdhani',sans-serif;font-size:18px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#0a1230;color:var(--text)}
.add-btn{padding:13px 26px;background:var(--accent);border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#000;cursor:pointer;white-space:nowrap;transition:opacity .15s;align-self:flex-end}
.add-btn:hover{opacity:.85}
.err{color:var(--accent2);font-size:11px;margin-top:6px;letter-spacing:1px}


.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.left-col{display:flex;flex-direction:column;gap:20px}
.team-panel.counter{flex:1}
@media(max-width:600px){
  .teams-grid{grid-template-columns:1fr;gap:6px}
  .left-col{gap:6px}
  .page{padding:10px 8px 80px}
  .logo{font-size:16px;letter-spacing:2px}
  .field.narrow{max-width:85px}
  .field.team-field{max-width:100%;flex:1 1 100%}
  .add-btn{width:100%}
  .team-panel{padding:4px 8px 3px;border-radius:5px}
  .team-header{margin-bottom:3px;padding-bottom:3px}
  .team-title{font-size:8px;letter-spacing:1px}
  .rally-row{padding:3px 8px;min-height:22px;border-radius:5px}
  .r-name{margin-right:auto;font-size:11px}
  .r-sub{display:none}
  .r-time{font-size:12px;min-width:36px}
  .r-badge{font-size:6px;padding:1px 3px}
  .rally-list{gap:2px}
  .t-start{display:none}
  .t-reset{display:none}
  .e-start-btn{display:none}
  .team-btns{display:none}
  .row-ov-count{font-size:20px}
  .row-ov-name{font-size:10px}
  .row-ov-gr{font-size:7px}
  #lock-label{display:none}
  .auto-note{display:none}
  .empty-team{padding:4px 6px;font-size:8px}
  .lang-btn{padding:3px 7px;font-size:10px}
  .teams-grid{gap:3px}
  .left-col{gap:3px}
  .page{padding:8px 6px 60px}
  .rally-row .pb{height:1px}
  .header{position:fixed;bottom:0;left:0;right:0;z-index:50;margin:0;padding:10px 14px;background:rgba(2,8,24,0.95);backdrop-filter:blur(10px);border-top:1px solid rgba(80,120,255,0.2)}
  .header::after{display:none}
  .header-row{margin-bottom:0}
}
.team-panel{border-radius:14px;padding:26px;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.team-panel.main{border:1px solid var(--main-border);background:var(--surface)}
.team-panel.counter{border:1px solid var(--counter-border);background:var(--surface)}
.team-panel.enemy{border:1px solid var(--red-border);background:rgba(30,8,8,0.6)}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px}
.team-panel.main .team-header{border-bottom:1px solid var(--main-border)}
.team-panel.counter .team-header{border-bottom:1px solid var(--counter-border)}
.team-panel.enemy .team-header{border-bottom:1px solid var(--red-border)}
.team-title{font-size:17px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.team-panel.main .team-title{color:var(--main)}
.team-panel.counter .team-title{color:var(--counter)}
.team-panel.enemy .team-title{color:var(--red)}
.team-btns{display:flex;gap:6px}
.t-start{padding:8px 18px;border:none;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.team-panel.main .t-start{background:var(--main);color:#000}
.team-panel.counter .t-start{background:var(--counter);color:#000}
.t-start:disabled{opacity:.3;cursor:not-allowed}
.t-reset{padding:8px 12px;background:transparent;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.team-panel.main .t-reset{border:1px solid var(--main-border);color:var(--muted)}
.team-panel.counter .t-reset{border:1px solid var(--counter-border);color:var(--muted)}
.team-panel.enemy .t-reset{border:1px solid var(--red-border);color:var(--muted)}
.t-reset:hover{opacity:.7}
.rally-list{display:flex;flex-direction:column;gap:8px}
.rally-row{display:grid;grid-template-columns:90px 90px 3fr 110px 80px auto;align-items:center;gap:0 18px;padding:12px 18px;border-radius:10px;position:relative;overflow:hidden;transition:border-color .3s;border:1px solid rgba(80,120,255,0.12);min-height:62px}
.team-panel.enemy .rally-row{border-color:rgba(239,68,68,0.12)}
.rally-row .pb{position:absolute;bottom:0;left:0;height:3px;transition:width .5s linear}
.team-panel.main .rally-row .pb{background:linear-gradient(90deg,var(--main),var(--green))}
.team-panel.counter .rally-row .pb{background:linear-gradient(90deg,var(--counter),var(--blue))}
.team-panel.enemy .rally-row .pb{background:linear-gradient(90deg,var(--red),var(--gold))}
.rally-row.st-waiting{border-color:var(--gold)!important}
.rally-row.st-rally{border-color:var(--accent)!important}
.team-panel.enemy .rally-row.st-rally{border-color:var(--red)!important}
.rally-row.st-marching{border-color:var(--blue)!important}
.rally-row.st-done{opacity:.4}
.row-overlay{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:0 14px;background:rgba(2,8,24,0.93);border-radius:10px;transition:opacity .2s}
.row-overlay.hidden{opacity:0;pointer-events:none}
.row-ov-info{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;width:100%}
.row-ov-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.1;text-transform:uppercase}
.team-panel.main .row-ov-name{color:#fff;text-shadow:0 0 16px rgba(126,184,255,0.9)}
.team-panel.counter .row-ov-name{color:#fff;text-shadow:0 0 16px rgba(52,211,153,0.9)}
.row-ov-gr{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.team-panel.main .row-ov-gr{color:var(--main);text-shadow:0 0 10px rgba(126,184,255,0.7)}
.team-panel.counter .row-ov-gr{color:var(--counter);text-shadow:0 0 10px rgba(52,211,153,0.7)}
.row-ov-count{position:absolute;left:50%;transform:translateX(-50%);font-size:54px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;text-align:center}
.team-panel.main .row-ov-count{color:var(--main);text-shadow:0 0 12px rgba(126,184,255,0.8)}
.team-panel.counter .row-ov-count{color:var(--counter);text-shadow:0 0 12px rgba(52,211,153,0.8)}
.row-ov-count.red{color:var(--accent2)!important;text-shadow:0 0 12px rgba(239,68,68,0.8)!important}
.row-ov-count.start{color:var(--green)!important;text-shadow:0 0 12px rgba(52,211,153,0.9)!important;font-size:36px!important}
.row-ov-count.pulse{animation:pulse .35s ease-out}
@keyframes pulse{0%{transform:translateX(-50%) scale(1.25)}100%{transform:translateX(-50%) scale(1)}}

.r-left{display:flex;flex-direction:column;justify-content:center;min-width:0;overflow:hidden}
.r-pet-col{display:flex;align-items:center;gap:6px;min-width:0}
.r-note-col{display:flex;align-items:center;min-width:0;flex:2}
.r-name{font-size:20px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;max-width:8ch}
.r-sub{font-size:13px;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.pet-col{display:flex;align-items:center;gap:3px;max-width:80px}
.pet-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;flex-shrink:0}
.pet-time{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;color:#a78bfa;white-space:nowrap;min-width:52px}
.pet-btn{padding:2px 7px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.35);border-radius:3px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#a78bfa;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.pet-btn:hover{background:rgba(167,139,250,0.3)}
.pet-btn.active{background:rgba(167,139,250,0.2);border-color:#a78bfa}
.pet-bar{flex:1;height:3px;background:rgba(167,139,250,0.12);border-radius:2px;overflow:hidden;min-width:40px}
.pet-bar-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#7eb8ff);border-radius:2px;transition:width .5s linear}
.r-note-col{display:flex;align-items:center;min-width:0;overflow:hidden}
.r-note-wrap{display:flex;align-items:center;justify-content:flex-start}
.r-note-input{background:transparent;border:none;border-bottom:1px solid rgba(126,184,255,0.3);color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;padding:2px 6px;width:100%;letter-spacing:.5px;text-align:left;transition:border-color .2s}
.r-note-input:focus{border-bottom-color:var(--accent)}
.r-note-input::placeholder{color:var(--muted);opacity:.6}
.r-note-text{font-size:15px;color:var(--accent);font-weight:600;letter-spacing:.5px;opacity:.85;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-right{display:contents}
@media(max-width:600px){
  .rally-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;min-height:40px}
  .pet-row{display:none}
  .r-note-wrap{display:none}
  .r-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
}
.r-badge{font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-weight:700;white-space:nowrap;justify-self:end}
.r-badge.idle{background:rgba(80,120,255,0.1);color:var(--muted)}
.r-badge.wait{background:rgba(251,191,36,.15);color:var(--gold)}
.r-badge.rally{background:rgba(126,184,255,.15);color:var(--accent)}
.team-panel.enemy .r-badge.rally{background:rgba(239,68,68,.15);color:var(--red)}
.r-badge.march{background:rgba(167,139,250,.2);color:var(--blue)}
.r-badge.fin{background:rgba(80,100,160,.1);color:var(--muted)}
.r-time{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;text-align:right;white-space:nowrap}
.team-panel.main .r-time{color:var(--main)}
.team-panel.counter .r-time{color:var(--counter)}
.team-panel.enemy .r-time{color:var(--red)}
.r-time.t-march{color:var(--blue)!important}
.r-time.t-done{color:var(--muted)!important}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:3px;transition:color .15s;line-height:1}
.del-btn:hover{color:var(--accent2)}
.e-start-btn{padding:6px 12px;background:var(--red);border:none;border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap;line-height:1}
.e-start-btn:hover{opacity:.8}
.cancel-btn{padding:4px 10px;background:transparent;border:1px solid rgba(239,68,68,0.4);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.cancel-btn:hover{background:rgba(239,68,68,0.15)}
.reopen-btn{padding:4px 10px;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.5);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.reopen-btn:hover{background:rgba(251,191,36,0.25)}
.reopen-btn:disabled{opacity:.3;cursor:not-allowed}
.reopen-overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(2,8,24,0.95);border-radius:6px}
.reopen-overlay.hidden{display:none}
.reopen-text{font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 16px rgba(251,191,36,0.8);text-align:center}
.reopen-count{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--counter);text-shadow:0 0 14px rgba(52,211,153,0.8);text-align:center}
.reopen-count.red{color:var(--red)!important;text-shadow:0 0 14px rgba(239,68,68,0.8)!important}
.reopen-count.start{color:var(--green)!important;text-shadow:0 0 14px rgba(52,211,153,0.9)!important;font-size:32px!important}
.reopen-count.pulse{animation:reopenPulse .35s ease-out}
@keyframes reopenPulse{0%{transform:scale(1.25)}100%{transform:scale(1)}}
.canceled-overlay{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:rgba(2,8,24,0.88);border-radius:6px;transition:opacity .3s}
.canceled-overlay.hidden{display:none}
.canceled-text{font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red);text-shadow:0 0 16px rgba(239,68,68,0.8)}
@media(max-width:600px){.canceled-text{font-size:14px;letter-spacing:2px}}
.empty-team{text-align:center;padding:24px 8px;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.auto-note{display:none}
.auto-note span{color:var(--counter)}
.connecting{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;letter-spacing:3px;text-transform:uppercase}
</style>

<script>
(function(){
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if(e.key === 'F12') { e.preventDefault(); return false; }
    if(e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) { e.preventDefault(); return false; }
    if(e.ctrlKey && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
    if(e.ctrlKey && e.key === 'S') { e.preventDefault(); return false; }
  });
  let devOpen = false;
  const threshold = 160;
  setInterval(() => {
    const w = window.outerWidth - window.innerWidth > threshold;
    const h = window.outerHeight - window.innerHeight > threshold;
    if((w || h) && !devOpen) {
      devOpen = true;
      document.body.style.filter = 'blur(8px)';
      document.body.style.pointerEvents = 'none';
    } else if(!w && !h && devOpen) {
      devOpen = false;
      document.body.style.filter = '';
      document.body.style.pointerEvents = '';
    }
  }, 500);
})();

function setLang(newLang) {
    lang = newLang;
    L    = LANGS[lang];

  
    const langLabels = {en:"EN", kr:"한국어", tr:"TR", zh:"中文", ru:"РУ", ar:"عر", fr:"FR"};
    document.querySelectorAll(".lang-btn").forEach(btn => {
   btn.classList.toggle("active", btn.textContent === langLabels[lang]);
    });

    document.getElementById("t-name-label").textContent  = L.nameLabel;
    document.getElementById("t-march-label").textContent = L.marchLabel;
    document.getElementById("t-team-label").textContent  = L.teamLabel;
    document.getElementById("t-add-btn").textContent     = L.addBtn;
    document.getElementById("opt-main").textContent      = L.optMain;
    document.getElementById("opt-counter").textContent   = L.optCounter;
    document.getElementById("opt-enemy").textContent     = L.optEnemy;
    document.getElementById("t-main-title").textContent    = L.mainTitle;
    document.getElementById("t-counter-title").textContent = L.counterTitle;
    document.getElementById("t-enemy-title").textContent   = L.enemyTitle;
    document.getElementById("auto-note").innerHTML         = L.autoNote;

  const pinTitleEl  = document.querySelector(".pin-title");
  const pinSubEl    = document.querySelector(".pin-sub");
  const pinOkEl     = document.querySelector(".pin-ok");
  const pinCancelEl = document.querySelector(".pin-cancel");
  const connectEl   = document.getElementById("connecting");
  if (pinTitleEl)  pinTitleEl.textContent  = L.pinTitle;
  if (pinSubEl)    pinSubEl.textContent    = L.pinSub;
  if (pinOkEl)     pinOkEl.textContent     = L.pinOk;
  if (pinCancelEl) pinCancelEl.textContent = L.pinCancel;
  if (connectEl)   connectEl.textContent   = L.connecting;

  const siteTitle = document.getElementById("site-title");
  if (siteTitle) siteTitle.innerHTML = L.siteTitle;
  const creditD = document.getElementById("credit-desktop");
  if (creditD) creditD.innerHTML = L.credit;
  const creditM = document.getElementById("credit-mobile");
  if (creditM) creditM.innerHTML = L.credit;

  const lockLabelEl = document.getElementById("lock-label");
  if (lockLabelEl) lockLabelEl.textContent = isUnlocked ? L.unlockLabel : L.lockLabel;

  const hideBtn = document.getElementById("hide-main-btn");
  if (hideBtn) {
    const panel = document.querySelector(".team-panel.main");
    hideBtn.textContent = panel && panel.classList.contains("hidden-panel") ? L.showBtn : L.hideBtn;
  }

  const rcBtn = document.getElementById("restart-counter-btn");
  if (rcBtn) rcBtn.innerHTML = L.restartBtn;
  const reBtn = document.getElementById("reopen-btn");
  if (reBtn) reBtn.innerHTML = L.restartBtn;

  ["main", "counter", "enemy"].forEach(team => {
    const startBtn = document.getElementById("start-" + team);
    if (startBtn) startBtn.textContent = L.startBtn;
    document.getElementById("t-reset-" + team).textContent = L.resetBtn;
    renderTeam(team);
  });
}

async function submitPin() {
  const input = document.getElementById("pin-input").value;

  
  const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(input));
  const hash   = Array.from(new Uint8Array(buffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");

  if (hash === ADMIN_HASH) {
    isUnlocked = true;
    document.getElementById("form-box").classList.remove("locked");
    document.getElementById("lock-btn").classList.add("unlocked");
    document.getElementById("lock-label").textContent = L.unlockLabel;
    setControlsVisibility(true);
    closePin();
    ["main", "counter", "enemy"].forEach(renderTeam);
  } else {
    document.getElementById("pin-err").textContent = L.pinErr;
    document.getElementById("pin-input").value     = "";
    document.getElementById("pin-input").focus();
  }
}

  isUnlocked = false;
  document.getElementById("form-box").classList.add("locked");
  document.getElementById("lock-btn").classList.remove("unlocked");
  document.getElementById("lock-label").textContent = L.lockLabel;

function fmt(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const mins = Math.floor(s / 60).toString().padStart(2, "0");
  const secs = (s % 60).toString().padStart(2, "0");
  return mins + ":" + secs;
}

function calcDelays(rallies) {
  if (!rallies.length) return rallies;

  
  const active = rallies.filter(r => !r.canceled);
  if (!active.length) return rallies;

  const maxTotal = Math.max(...active.map(r => r.total));

  return rallies.map(r => {
    if (r.canceled) return r;
    return { ...r, delay: maxTotal - r.total };
  });
}

function getElapsed(timerStart) {
  if (!timerStart) return null;
  return (Date.now() - timerStart) / 1000;
}

function getRallyState(rally, elapsed, teamStarted) {
  if (!teamStarted || elapsed === null) return "idle";
  if (elapsed < 0)             return "idle";
  if (elapsed < rally.delay)   return "waiting";

  const relativeElapsed = elapsed - rally.delay;
  if (relativeElapsed < BASE_TIME)    return "rally";
  if (relativeElapsed < rally.total)  return "marching";
  return "done";
}

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, volume = 0.3, type = "sine") {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.015);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + 0.02);
  } catch (e) {}
}


function beepGetReady() {
  playTone(440, 0.25, 0.25, "sine");
}


function beepTick() {
  playTone(520, 0.12, 0.22, "sine");
}


function beepStart() {
  playTone(600, 0.10, 0.30, "sine");
  setTimeout(() => playTone(800, 0.18, 0.35, "sine"), 110);
}


function beepAlarm() {
  playTone(520, 0.45, 0.30, "sine");
  setTimeout(() => playTone(520, 0.45, 0.30, "sine"), 600);
  setTimeout(() => playTone(520, 0.45, 0.30, "sine"), 1200);
}

function addRally() {
  const name    = document.getElementById("inp-name").value.trim();
  const rawSecs = document.getElementById("inp-march").value.trim();
  const team    = document.getElementById("inp-team").value;
  const errEl   = document.getElementById("err");

  errEl.style.display = "none";

  if (!name) {
    errEl.textContent   = L.errName;
    errEl.style.display = "block";
    return;
  }

  const march = parseInt(rawSecs);
  if (isNaN(march) || march < 0) {
    errEl.textContent   = L.errFmt;
    errEl.style.display = "block";
    return;
  }

  const base  = team === "enemy" ? ENEMY_BASE : BASE_TIME;
  const total = base + march;

  const newRally = {
    id:        Date.now(),
    name:      name,
    march:     march,
    total:     total,
    delay:     0,
    started:   false,
    timerStart: null,
    note:      "",
    petStart:  null
  };

  const updated = calcDelays([...STATE[team].rallies, newRally]);
  fbSet(team + "/rallies", updated);
  document.getElementById("inp-name").value  = "";
  document.getElementById("inp-march").value = "";
  document.getElementById("inp-name").focus();
}

function fmtLong(s) {
  s = Math.max(0, Math.round(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

let petTicker = null;
function startPetTicker() {
  if (petTicker) return;
  petTicker = setInterval(() => {
    ['main','counter','enemy'].forEach(team => {
      (STATE[team].rallies || []).forEach(r => {
        if (!r.petStart) return;
        const elapsed = (Date.now() - r.petStart) / 1000;
        const remaining = Math.max(0, 7200 - elapsed);
        const pct = Math.max(0, (remaining / 7200) * 100).toFixed(1);
        const timeEl = document.getElementById('pet-time-' + team + '-' + r.id);
        
        if (timeEl) timeEl.textContent = fmtLong(remaining);
        
        if (remaining <= 0 && r.petStart) {
          const reset = STATE[team].rallies.map(x =>
            x.id === r.id ? { ...x, petStart: null } : x
          );
          fbSet(team + "/rallies", reset);
        }
      });
    });
  }, 1000);
}


const pendingCancelResets = new Set();
function cancelRally(team, id) {
  
  stopLocalTicker(team);

  const updated = STATE[team].rallies.map(r =>
    r.id === id ? { ...r, canceled: true, started: false, timerStart: null } : r
  );
  fbSet(team + "/rallies", updated);

  
  const key = team + "_" + id;
  if (pendingCancelResets.has(key)) return;
  pendingCancelResets.add(key);

  setTimeout(() => {
    pendingCancelResets.delete(key);
    
    const current = (STATE[team].rallies || []).find(r => r.id === id);
    if (!current || !current.canceled) return;

    const reset = STATE[team].rallies.map(r =>
      r.id === id ? { ...r, canceled: false, started: false, timerStart: null } : r
    );
    fbSet(team + "/rallies", reset);
  }, 4000);
}

function unCancelRally(team, id) {
  const updated = STATE[team].rallies.map(r => {
    if (r.id !== id) return r;
    return { ...r, canceled: false };
  });
  fbSet(team + "/rallies", updated);
}

function runRestartSequence(counterRallies, enemyRalliesUpdate) {
  const REOPEN_BASE    = 5;
  const LABEL_PHASE_MS = 1500;

  
  counterRallies.forEach(r => {
    const ov  = document.getElementById("reopen-ov-counter-" + r.id);
    const txt = document.getElementById("reopen-txt-counter-" + r.id);
    const cnt = document.getElementById("reopen-cnt-counter-" + r.id);
    if (!ov) return;
    ov.classList.remove("hidden");
    if (txt) { txt.textContent = L.restartText; txt.style.display = ""; }
    if (cnt) { cnt.textContent = ""; cnt.style.display = "none"; }
  });

  
  setTimeout(() => {
    const launchAt = Date.now() + (REOPEN_BASE * 1000);
    const updates = { "counter/started": true, "counter/timerStart": launchAt };
    if (enemyRalliesUpdate) updates["enemy/rallies"] = enemyRalliesUpdate;
    db.ref("svs").update(updates);

    
    const maxDelay = Math.max(...counterRallies.map(r => r.delay || 0));

    counterRallies.forEach(r => {
      const txt = document.getElementById("reopen-txt-counter-" + r.id);
      const cnt = document.getElementById("reopen-cnt-counter-" + r.id);
      if (!cnt) return;
      if (txt) txt.style.display = "none";
      cnt.style.display = "";

      let count = REOPEN_BASE + r.delay;
      cnt.textContent = count;
      cnt.className   = "reopen-count";
      cnt.classList.remove("pulse"); void cnt.offsetWidth; cnt.classList.add("pulse");
      if (r.delay === 0) beepTick();

      const iv = setInterval(() => {
        count--;
        const cnt2 = document.getElementById("reopen-cnt-counter-" + r.id);
        const ov2  = document.getElementById("reopen-ov-counter-" + r.id);
        if (!cnt2) { clearInterval(iv); return; }

        if (count > 0) {
          cnt2.textContent = count;
          cnt2.className   = "reopen-count" + (count <= 2 ? " red" : "");
          cnt2.classList.remove("pulse"); void cnt2.offsetWidth; cnt2.classList.add("pulse");
          if (r.delay === 0) beepTick();
        } else {
          clearInterval(iv);
          cnt2.className   = "reopen-count start";
          cnt2.textContent = L.startText;
          beepStart(); 

          
          setTimeout(() => {
            if (ov2) ov2.classList.add("hidden");
            const txt2 = document.getElementById("reopen-txt-counter-" + r.id);
            if (txt2) txt2.style.display = "";

            
            if (r.delay === maxDelay) {
              isReopening = false;
              
              renderTeam("counter");
            }
          }, 800);
        }
      }, 1000);
    });
  }, LABEL_PHASE_MS);
}

function reopenRallies() {
  const reopenBtn = document.getElementById("reopen-btn");
  if (reopenBtn) reopenBtn.disabled = true;

  isReopening = true;
  stopAllAudio();
  
  stopLocalTicker("counter");
  if (localTickers.enemy) { clearInterval(localTickers.enemy); localTickers.enemy = null; }

  
  document.querySelectorAll("#list-counter .row-overlay").forEach(ov => ov.classList.add("hidden"));
  document.querySelectorAll("#list-counter .reopen-overlay").forEach(ov => ov.classList.add("hidden"));

  
  fbUpdate("counter", { started: false, timerStart: null });

  
  const now = Date.now();
  const enemyRestarted = STATE.enemy.rallies.map(r => ({
    ...r, started: true, timerStart: now, canceled: false
  }));

  const counterRallies = STATE.counter.rallies;
  if (!counterRallies.length) {
    
    fbSet("enemy/rallies", enemyRestarted);
    isReopening = false;
    return;
  }

  beepAlarm();
  runRestartSequence(counterRallies, enemyRestarted);
}

function getOv(team, id) {
  const row = document.querySelector(`#list-${team} [data-id="${id}"]`);
  return row ? row.querySelector(".row-overlay") : null;
}

function runOverlay(team, rally) {
  const row = document.querySelector(`#list-${team} [data-id="${rally.id}"]`);
  if (!row) return;

  const ov       = row.querySelector(".row-overlay");
  const grEl     = row.querySelector(".row-ov-gr");
  const countEl  = row.querySelector(".row-ov-count");
  const infoBlock = row.querySelector(".row-ov-info");

  if (!ov) return;
  ov.classList.remove("hidden");
  if (infoBlock) infoBlock.style.display = "flex";
  grEl.textContent      = L.grText;
  countEl.textContent   = "";
  countEl.className     = "row-ov-count";
  countEl.style.display = "none";
  beepGetReady();
  setTimeout(() => {
    const ov2      = getOv(team, rally.id);
    if (!ov2) return;

    const countEl2  = ov2.querySelector(".row-ov-count");
    const infoEl    = ov2.querySelector(".row-ov-info");
    if (!countEl2) return;

    if (infoEl) infoEl.style.display = "none";
    countEl2.style.display = "";

    let count = 3 + rally.delay;
    countEl2.textContent = count;
    pulseCt(countEl2);
    beepTick();

    const interval = setInterval(() => {
      count--;

      const ov3 = getOv(team, rally.id);
      const ce  = ov3 ? ov3.querySelector(".row-ov-count") : null;
      if (!ce) {
        clearInterval(interval);
        return;
      }
      if (count > 0) {
        ce.textContent = count;
        ce.className   = "row-ov-count" + (count <= 2 ? " red" : "");
        pulseCt(ce);
        beepTick();
      } else {
        clearInterval(interval);
        ce.className   = "row-ov-count start";
        ce.textContent = L.startText;
        beepStart();
        setTimeout(() => {
          const o = getOv(team, rally.id);
          if (o) o.classList.add("hidden");
        }, 800);
      }
    }, 1000);

  }, 2000);
}

function startLocalTicker(team) {
  if (localTickers[team]) clearInterval(localTickers[team]);
  localTickers[team] = setInterval(() => tickTeam(team), 200);
}

function stopLocalTicker(team) {
  if (localTickers[team]) {
    clearInterval(localTickers[team]);
    localTickers[team] = null;
  }
}

function tickTeam(team) {
  const T = STATE[team];
  if (!T.started || !T.timerStart) return;

  const elapsed = getElapsed(T.timerStart);

  T.rallies.forEach(rally => {
    const row = document.querySelector(`#list-${team} [data-id="${rally.id}"]`);
    if (!row) return;

    
    const overlay = row.querySelector(".row-overlay");
    if (overlay && !overlay.classList.contains("hidden")) return;
    if (rally.canceled) return;

    const state = getRallyState(rally, elapsed, T.started);
    row.className = "rally-row st-" + state;

    const badge = row.querySelector(".r-badge");
    const time  = row.querySelector(".r-time");
    const pb    = row.querySelector(".pb");
    if (!badge) return;

    if (state === "idle") {
      badge.className   = "r-badge idle";
      badge.textContent = L.badgeReady;
      time.className    = "r-time";
      time.textContent  = fmt(BASE_TIME);
      pb.style.width    = "0%";

    } else if (state === "waiting") {
      badge.className   = "r-badge wait";
      badge.textContent = L.badgeWait;
      time.className    = "r-time";
      time.textContent  = fmt(rally.delay - elapsed);
      pb.style.width    = "0%";

    } else if (state === "rally") {
      const re = elapsed - rally.delay;
      badge.className   = "r-badge rally";
      badge.textContent = L.badgeRally;
      time.className    = "r-time";
      time.textContent  = fmt(BASE_TIME - re);
      pb.style.width    = Math.min(100, (re / BASE_TIME * 100)).toFixed(1) + "%";

    } else if (state === "marching") {
      const re = elapsed - rally.delay;
      badge.className   = "r-badge march";
      badge.textContent = L.badgeMarch;
      time.className    = "r-time t-march";
      time.textContent  = fmt(rally.total - re);
      pb.style.width    = Math.min(100, (re / rally.total * 100)).toFixed(1) + "%";

    } else { 
      badge.className   = "r-badge fin";
      badge.textContent = L.badgeDone;
      time.className    = "r-time t-done";
      time.textContent  = "00:00";
      pb.style.width    = "100%";
    }
  });

  
  const allDone = T.rallies.every(r => getRallyState(r, elapsed, T.started) === "done");
  if (elapsed >= 0 && allDone) {
    stopLocalTicker(team);
    fbUpdate(team, { started: false, timerStart: null });
  }
}


function tickEnemy() {
  STATE.enemy.rallies.forEach(rally => {
    if (!rally.started || !rally.timerStart) return;
    if (rally.canceled) {
      
      return;
    }

    const elapsed = (Date.now() - rally.timerStart) / 1000;
    const row     = document.querySelector(`#list-enemy [data-id="${rally.id}"]`);
    if (!row) return;

    const badge = row.querySelector(".r-badge");
    const time  = row.querySelector(".r-time");
    const pb    = row.querySelector(".pb");
    if (!badge) return;

    if (elapsed < ENEMY_BASE) {
      badge.className   = "r-badge rally";
      badge.textContent = L.badgeRally;
      time.className    = "r-time";
      time.textContent  = fmt(ENEMY_BASE - elapsed);
      pb.style.width    = Math.min(100, (elapsed / ENEMY_BASE * 100)).toFixed(1) + "%";
      row.className     = "rally-row st-rally";

    } else if (elapsed < rally.total) {
      badge.className   = "r-badge march";
      badge.textContent = L.badgeMarch;
      time.className    = "r-time t-march";
      time.textContent  = fmt(rally.total - elapsed);
      pb.style.width    = Math.min(100, (elapsed / rally.total * 100)).toFixed(1) + "%";
      row.className     = "rally-row st-marching";

    } else {
      
      const updated = STATE.enemy.rallies.map(r =>
        r.id === rally.id ? { ...r, started: false, timerStart: null } : r
      );
      fbSet("enemy/rallies", updated);
    }
  });
}

          ${showDelete ? `<button class="del-btn" onclick="deleteRally('enemy',${rally.id})">✕</button>` : ""}
        </div>
        <div class="canceled-overlay${rally.canceled ? "" : " hidden"}">
          <span class="canceled-text">${L.canceledText}</span>
        </div>
      </div>
    `).join("");

  } else {
    list.innerHTML = T.rallies.map(rally => `
      <div class="rally-row st-idle" data-id="${rally.id}">
        <div class="pb" style="width:0%"></div>
        <div class="row-overlay hidden">
          <div class="row-ov-info">
            <div class="row-ov-name">${rally.name}</div>
            <div class="row-ov-gr"></div>
          </div>
          <div class="row-ov-count"></div>
        </div>
        <div class="r-left"><div class="r-name">${rally.name}</div></div>
        <div class="r-pet-col">
          <span class="pet-label">${L.petLabel}</span>
          
          <span class="pet-time" id="pet-time-${team}-${rally.id}">${rally.petStart ? fmtLong(Math.max(0,7200-((Date.now()-rally.petStart)/1000))) : fmtLong(7200)}</span>
          
        </div>
        <div class="r-note-col">
          ${isUnlocked
            ? `<input class="r-note-input" placeholder="${L.notePlaceholder}" value="${rally.note||''}" onchange="updateNote('${team}',${rally.id},this.value)" onclick="event.stopPropagation()">`
            : rally.note ? `<span class="r-note-text">${rally.note}</span>` : ''}
        </div>
        <span class="r-badge idle">${L.badgeReady}</span>
        <span class="r-time">${fmt(BASE_TIME)}</span>
        <div style="display:flex;gap:5px;align-items:center">
          ${isUnlocked && T.started && !rally.canceled ? `<button class="cancel-btn" onclick="cancelRally('${team}',${rally.id})">${L.cancelBtn}</button>` : ""}
          ${showDelete ? `<button class="del-btn" onclick="deleteRally('${team}',${rally.id})">✕</button>` : ""}
          ${isUnlocked ? `<button class="pet-btn${rally.petStart ? ' active' : ''}" onclick="togglePet('${team}',${rally.id})">${rally.petStart ? L.petStop : L.petStart}</button>` : ""}
        </div>
        <div class="canceled-overlay${rally.canceled ? "" : " hidden"}">
          <span class="canceled-text">${L.canceledText}</span>
        </div>
        <div class="reopen-overlay hidden" id="reopen-ov-${team}-${rally.id}">
          <div style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center">
            <div class="reopen-text" id="reopen-txt-${team}-${rally.id}">${L.restartText}</div>
            <div class="reopen-count" id="reopen-cnt-${team}-${rally.id}" style="display:none;width:100%;text-align:center"></div>
          </div>
        </div>
      </div>
    `).join("");
  }
}

function listenTeam(team) {
  ref(team).on("value", snap => {
    
    document.getElementById("connecting").style.display = "none";
    document.getElementById("main-ui").style.display   = "block";
    document.getElementById("sync-dot").classList.add("online");

    const data         = snap.val() || {};
    const newRallies   = data.rallies    || [];
    const newStarted   = !!data.started;
    const newTimerStart = data.timerStart || null;

    const prev         = prevState[team];
    const wasStarted   = !!prev.started;
    const hadTimerStart = prev.timerStart || null;

    
    STATE[team]     = { rallies: newRallies, started: newStarted, timerStart: newTimerStart };
    prevState[team] = { started: newStarted, timerStart: newTimerStart };

    renderTeam(team);

    if (team !== "enemy") {
      if (newStarted && newTimerStart) {
        const elapsed = getElapsed(newTimerStart);

        
        const isFreshStart = !wasStarted || hadTimerStart !== newTimerStart;
        if (isFreshStart && elapsed < 0 && !isReopening) {
          setTimeout(() => newRallies.forEach(r => runOverlay(team, r)), 50);
        }

        startLocalTicker(team);
      } else {
        stopLocalTicker(team);
      }

    } else {
      
      const hasActiveRallies = newRallies.some(r => r.started);
      if (hasActiveRallies) {
        if (!localTickers.enemy) {
          localTickers.enemy = setInterval(tickEnemy, 200);
        }
      } else {
        if (localTickers.enemy) {
          clearInterval(localTickers.enemy);
          localTickers.enemy = null;
        }
      }
    }
  });
}


["main", "counter", "enemy"].forEach(listenTeam);


db.ref(".info/connected").on("value", snap => {
  const dot = document.getElementById("sync-dot");
  if (snap.val()) {
    dot.classList.add("online");
    dot.classList.remove("offline");
  } else {
    dot.classList.remove("online");
    dot.classList.add("offline");
  }
});

(function initStars() {
  const canvas = document.getElementById("stars");

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const ctx = canvas.getContext("2d");

  const stars = Array.from({ length: 200 }, () => ({
    x:     Math.random(),
    y:     Math.random(),
    r:     Math.random() * 1.5 + 0.2,
    phase: Math.random(),
    speed: Math.random() * 0.004 + 0.001
  }));

  const nebulae = [
    { x: 0.10, y: 0.30, rx: 200, ry: 120, color: "rgba(40,0,120,0.15)" },
    { x: 0.85, y: 0.55, rx: 180, ry: 110, color: "rgba(100,0,0,0.12)" },
    { x: 0.50, y: 0.85, rx: 220, ry: 80,  color: "rgba(0,40,140,0.12)" },
    { x: 0.60, y: 0.10, rx: 160, ry: 90,  color: "rgba(0,60,160,0.10)" }
  ];

  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    
    nebulae.forEach(n => {
      const cx = n.x * canvas.width;
      const cy = n.y * canvas.height;
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, n.rx);
      gradient.addColorStop(0, n.color);
      gradient.addColorStop(1, "transparent");

      ctx.save();
      ctx.scale(1, n.ry / n.rx);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(cx, cy * (n.rx / n.ry), n.rx, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    
    stars.forEach(star => {
      star.phase += star.speed;
      if (star.phase > 1) star.phase = 0;

      const alpha = 0.2 + Math.abs(Math.sin(star.phase * Math.PI)) * 0.8;
      ctx.beginPath();
      ctx.arc(star.x * canvas.width, star.y * canvas.height, star.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 210, 255, ${alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(drawFrame);
  }

  drawFrame();
})();

document.getElementById("inp-march").addEventListener("keydown", e => {
